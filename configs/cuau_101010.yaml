# ──────────────────────────────────────────────────────────────────────────────
# cuau_101010.yaml
#
# Full configuration for TEMGen contrastive learning on CuAu FCC 10×10×10.
# All numbers come from the CuAu 101010 Encoding Manual (Notion spec).
# ──────────────────────────────────────────────────────────────────────────────

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  train_h5: data/hdf5/train_20260305.h5
  test_h5:  data/hdf5/test_20260304.h5
  val_fraction: 0.1
  val_seed: 42
  num_workers: 8

# ── Image encoder ─────────────────────────────────────────────────────────────
image_encoder:
  d_model: 256               # token dimension D
  K_fourier: 10              # Fourier frequency bands
  pretrained_cnn: false      # ImageNet pretrained ResNet-18 init

  # Aggregator selection: 1 = Perceiver, 2 = Geometry-Aware, 3 = Voxel
  aggregator_method: 1

  # Method 1 & 2: Perceiver
  n_latents: 32              # latent tokens
  n_heads: 8                 # attention heads, d_head = 256/8 = 32
  L_cross: 1                 # cross-attention blocks
  L_self: 2                  # self-attention blocks per cross block
  d_proj: 128                # projection head output dim (InfoNCE)

  # Method 2 only: Geometry-Aware Perceiver
  beta_init: 1.0             # positional bias scale
  sigma_init: 0.5            # anchor width (via softplus)

  # Method 3 only: Cross-View Voxel Latent
  L_blocks: 2                # cross+self attention blocks

# ── Structure encoder ─────────────────────────────────────────────────────────
structure_encoder:
  hidden_dim: 128            # GNN hidden dimension d
  n_layers: 4                # CSPLayerCartesian layers
  d_out: 256                 # readout output dim (latent dim)
  d_proj: 128                # projection head output dim (InfoNCE)
  max_atomic_num: 118        # embedding table size (Embedding(119, 128))

# ── Graph construction ────────────────────────────────────────────────────────
graph:
  r_c: 5.0                   # radius cutoff in Å (captures ≤ 3NN)
  K_rbf: 50                  # Gaussian RBF centers
  max_num_neighbors: 64      # max neighbours per atom for radius_graph

# ── Contrastive loss ──────────────────────────────────────────────────────────
contrastive:
  log_temp_init: 2.6593      # log(1/0.07) ≈ 2.6593
  temp_min: 0.01             # lower clamp for τ
  temp_max: 1.0              # upper clamp for τ

# ── Training ──────────────────────────────────────────────────────────────────
training:
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  warmup_epochs: 10
  epochs: 200
  batch_size: 256            # per-GPU batch size
  accumulate_grad_batches: 1 # effective BS = batch_size × GPUs × this
  grad_clip_norm: 1.0
  eval_every_n_epochs: 5     # full-set retrieval eval on test set